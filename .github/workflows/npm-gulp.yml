name: Build lampa-source

on:
  push:
    branches:
      - my
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-dispatch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Build client
        run: |
          npm install
          npm run build
          npm run pack

      - name: Upload client artifact
        uses: actions/upload-artifact@v4
        with:
          name: lampa-source-client
          path: build/github/lampa
          if-no-files-found: error

      - name: Trigger lampa-server publish
        env:
          REPO_ACCESS_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN }}
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${REPO_ACCESS_TOKEN}" \
            https://api.github.com/repos/zolroman/lampa-server/dispatches \
            -d @- <<'EOF'
          {
            "event_type": "lampa_source_updated",
            "client_payload": {
              "source_repository": "${{ github.repository }}",
              "source_ref": "my",
              "source_sha": "${{ github.sha }}"
            }
          }
          EOF
